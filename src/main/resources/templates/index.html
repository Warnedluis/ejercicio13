<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Calculos varios Ejercicio 13</title>
</head>
<body>

<div class="card text-center" style = "margin:25%; margin-top: 5%;">

  <div class="card-body">
    <form>
  <fieldset >
    <legend style = "text-align: center;">Operaciones</legend>
    <div class="mb-3">
      <label for="TextInput" class="form-label">Operaciones con numero</label>
      <input type="number" id="Numero" class="form-control" placeholder="Numero a elegir">
    </div>
    <div class="mb-3">
      <label for="menu" class="form-label">Operaciones</label>
      <select id="menu" class="form-select">
        <option>Es primo?</option>
        <option>Factorial</option>
        <option>Suma de impares</option>
        <option>Suma de pares</option>
        <option>¿Es par?</option>
      </select>
    </div>
    <div class="mb-3">
      <div class="form-check">
        <label for="Resultado" class = "form-label">Resultado: </label>
        <input type="text" id="Resultado" class="form-control" readonly disabled>
      </div>
    </div>
    <button id = "btnCalcular" type="button" class="btn btn-primary" onclick = >Obtener resultado</button>
  </fieldset>
</form>
  </div>
</div>



    
<script src = "./script.js"></script>
</body>
